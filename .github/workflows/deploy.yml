name: Deploy RtaWeb

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 137.131.131.127
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/apps/RtaWeb
            git fetch origin main
            git reset --hard origin/main
            source venv/bin/activate
            pip install -r requirements.txt
            python manage.py migrate --noinput
            python manage.py collectstatic --noinput
            sudo systemctl restart gunicorn
            sudo systemctl restart nginx
          
      - name: Send email on success
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "✅ Deploy realizado com sucesso - RtaWeb"
          to: leokaique7@gmail.com
          from: RtaWeb Deploy <${{ secrets.EMAIL_USER }}>
          body: |
            🚀 Deploy realizado com sucesso!

            Projeto: RtaWeb
            Branch: main
            Commit: ${{ github.sha }}

            Acesse:
            https://rtaalmeidaweb.site

            Servidor atualizado e rodando.
