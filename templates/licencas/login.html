{% load static %}
<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Login RtaWeb</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a, #1e293b);
        }

        [data-bs-theme="light"] body {
            background: linear-gradient(135deg, #e5e7eb, #f8fafc);
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 32px;
            border-radius: 16px;
            backdrop-filter: blur(20px);
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        [data-bs-theme="light"] .login-card {
            background: rgba(255,255,255,0.9);
            border: 1px solid #d1d5db;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 24px;
        }

        .form-control {
            height: 45px;
        }

        .btn-login {
            height: 45px;
            font-weight: 600;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
        }
    </style>
</head>

<body>

<button id="themeToggle" class="btn btn-outline-light theme-toggle">
    <i id="themeIcon" class="bi bi-sun-fill"></i>
</button>

<div class="login-card">

    <div class="logo">
       
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} mb-3">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="post" action="">
               {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Documento de Acesso</label>
           {{ form.registro }}
        </div>

        <div class="mb-3">
            <label class="form-label">Usuário</label>
            {{ form.usuario }}
        </div>

        <div class="mb-4">
            <label class="form-label">Senha</label>
            {{ form.senha }}
        </div>

        <button class="btn btn-success w-100 btn-login">
            Entrar
        </button>
    </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const html = document.documentElement;
    const themeToggle = document.getElementById('themeToggle');
    const icon = document.getElementById('themeIcon');

    function applyTheme(theme) {
        html.setAttribute('data-bs-theme', theme);
        localStorage.setItem('theme', theme);

        if (theme === 'dark') {
            icon.className = "bi bi-sun-fill";
            themeToggle.classList.remove("btn-outline-dark");
            themeToggle.classList.add("btn-outline-light");
        } else {
            icon.className = "bi bi-moon-fill";
            themeToggle.classList.remove("btn-outline-light");
            themeToggle.classList.add("btn-outline-dark");
        }
    }

    applyTheme(localStorage.getItem("theme") || "dark");

    themeToggle.addEventListener("click", () => {
        const current = html.getAttribute("data-bs-theme");
        applyTheme(current === "dark" ? "light" : "dark");
    });
</script>

</body>
</html>
