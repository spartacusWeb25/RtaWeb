{% load static %}
<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Login RtaWeb</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{% static 'licencas/css/forms.css' %}" rel="stylesheet">
    <link href="{% static 'licencas/css/list.css' %}" rel="stylesheet">
</head>

<body>

<button id="themeToggle" class="btn btn-outline-light theme-toggle">
    <i id="themeIcon" class="bi bi-sun-fill"></i>
</button>

<div class="login-card">
    <h5 class="text-center mb-4">Acesso ao sistema</h5>

    {% include "partials/ui/toasts.html" %}

    <form method="post" action="" id="loginForm">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Documento de Acesso</label>
            <div class="input-group">
                {{ form.registro }}
                <button class="input-icon-btn" type="button" data-clear-target="id_registro" title="Limpar campo">
                    <i class="bi bi-x-circle"></i>
                </button>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Usuário</label>
            <div class="input-group">
                {{ form.usuario }}
                <button class="input-icon-btn" type="button" data-clear-target="id_usuario" title="Limpar campo">
                    <i class="bi bi-x-circle"></i>
                </button>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Senha</label>
            <div class="input-group">
                {{ form.senha }}
                <button class="input-icon-btn" type="button" id="toggleSenha" title="Mostrar/ocultar senha">
                    <i class="bi bi-eye"></i>
                </button>
            </div>
        </div>

        <div class="progress login-progress mb-3" id="loginProgressWrapper" role="progressbar" aria-label="Progresso de login">
            <div id="loginProgressBar" class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%"></div>
        </div>

        <button id="submitBtn" class="btn btn-success w-100 btn-login" type="submit">
            <span class="btn-label">Entrar</span>
            <span class="spinner-border spinner-border-sm ms-2 d-none" aria-hidden="true"></span>
        </button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/toasts.js' %}"></script>
<script src="{% static 'licencas/js/forms.js' %}"></script>

</body>
</html>
