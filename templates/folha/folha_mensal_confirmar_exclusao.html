{% extends "base.html" %}

{% block title %}Excluir Lançamento de Folha{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">Confirmação de exclusão</div>
    <div class="card-body">
        <p>Confirma excluir o lançamento <strong>Func. {{ item.fome_func }} / Ref. {{ item.fome_refe }} / Evento {{ item.fome_even }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Excluir</button>
            <a href="{% url 'folha:folha_mensal_listar' %}?banco={{ request.banco }}" class="btn btn-outline-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
